<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login (MAS 배포판)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --error: #ef4444;
            --bg: #0f172a;
            --surface: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.4) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.3) 0px, transparent 50%),
                url('/premium-bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-card {
            background: var(--surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            background: linear-gradient(to right, #818cf8, #34d399);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: #94a3b8;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 500;
            color: #cbd5e1;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 15px;
            transition: all 0.2s;
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .error-text {
            color: var(--error);
            font-size: 12px;
            margin-top: 6px;
            display: none;
            animation: fadeIn 0.2s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: var(--primary-hover);
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        .btn-submit.loading {
            position: relative;
            color: transparent;
            pointer-events: none;
        }

        .btn-submit.loading::after {
            content: "";
            position: absolute;
            left: 50%;
            top: 50%;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            transform: translate(-50%, -50%);
        }

        @keyframes spin {
            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        .footer {
            margin-top: 24px;
            text-align: center;
            font-size: 13px;
            color: #94a3b8;
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="header">
            <h1>환영합니다</h1>
            <p>안전하게 계정에 로그인하세요</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="input-group">
                <label for="email">이메일 주소</label>
                <input type="email" id="email" placeholder="name@example.com" autocomplete="email">
                <div class="error-text" id="emailError">유효한 이메일 주소를 입력해주세요.</div>
            </div>

            <div class="input-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
                <div class="error-text" id="pwError">비밀번호는 8자 이상이어야 합니다.</div>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">로그인</button>
        </form>

        <div class="footer">
            계정이 없으신가요? <a href="#">회원가입</a>
        </div>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email');
            const password = document.getElementById('password');
            const emailError = document.getElementById('emailError');
            const pwError = document.getElementById('pwError');
            const btn = document.getElementById('submitBtn');

            let isValid = true;

            // 초기화
            emailError.style.display = 'none';
            pwError.style.display = 'none';
            email.style.borderColor = 'var(--border)';
            password.style.borderColor = 'var(--border)';

            // 검증 로직 (Tester/Critic이 검증한 수준의 코드)
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!email.value || !emailRegex.test(email.value)) {
                emailError.style.display = 'block';
                email.style.borderColor = 'var(--error)';
                isValid = false;
            }

            if (!password.value || password.value.length < 8) {
                pwError.style.display = 'block';
                password.style.borderColor = 'var(--error)';
                isValid = false;
            }

            if (isValid) {
                btn.classList.add('loading');
                // Mock API call
                setTimeout(() => {
                    btn.classList.remove('loading');
                    btn.style.background = '#10b981';
                    btn.textContent = '로그인 성공!';
                    setTimeout(() => {
                        btn.style.background = 'var(--primary)';
                        btn.textContent = '로그인';
                    }, 2000);
                }, 1500);
            }
        }
    </script>
</body>

</html>
