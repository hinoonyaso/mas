<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 (Single Agent 버전)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background-color: white;
            padding: 20px;
            border: 1px solid #ccc;
            width: 300px;
        }

        h2 {
            text-align: center;
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
        }

        input[type="text"],
        input[type="password"] {
            width: 90%;
            padding: 8px;
            border: 1px solid #999;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        .error-msg {
            color: red;
            font-size: 12px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <h2>로그인하세요</h2>
        <div class="form-group">
            <label>아이디:</label>
            <input type="text" id="userid" placeholder="아이디 입력">
        </div>
        <div class="form-group">
            <label>비밀번호:</label>
            <input type="password" id="userpw" placeholder="비밀번호 입력">
            <div class="error-msg" id="error">비밀번호가 틀렸습니다.</div>
        </div>
        <button onclick="login()">로그인</button>
    </div>

    <script>
        function login() {
            var id = document.getElementById("userid").value;
            var pw = document.getElementById("userpw").value;
            if (id === "" || pw === "") {
                alert("다 입력해주세요");
            } else {
                alert("로그인 버튼 눌림 (구현 안됨)");
            }
        }
    </script>
</body>

</html>
